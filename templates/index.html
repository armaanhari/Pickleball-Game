<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickleball Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Nav ── */
    #nav {
      width: 680px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 14px;
      margin-bottom: 2px;
      border-bottom: 1px solid #1e1e2e;
    }
    #nav-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff;
    }
    #nav-title span {
      color: #4da6ff;
    }
    #nav-home {
      background: none;
      border: 1px solid #333;
      color: #bbb;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    #nav-home:hover {
      border-color: #4da6ff;
      color: #4da6ff;
      background: rgba(77, 166, 255, 0.08);
    }

    /* ── HUD ── */
    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 680px;
      padding: 4px 14px;
      margin-bottom: 4px;
    }
    .player-panel {
      display: flex;
      flex-direction: column;
      min-width: 110px;
    }
    .player-panel.right {
      align-items: flex-end;
    }
    .player-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #666;
      margin-bottom: 1px;
    }
    #score-p1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #4da6ff;
    }
    #status-msg {
      font-size: 0.95rem;
      color: #aaa;
      text-align: center;
      flex: 1;
      padding: 0 12px;
    }
    #score-p2 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #ff6eb4;
    }
    #canvas-holder canvas {
      display: block;
      border: 2px solid #222;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <nav id="nav">
    <span id="nav-title">Pickleball <span>Pong</span></span>
    <button id="nav-home" onclick="window.goToMenu && window.goToMenu()">⌂ Home</button>
  </nav>

  <div id="hud">
    <div class="player-panel">
      <span id="label-p1" class="player-label">Player 1</span>
      <span id="score-p1">0</span>
    </div>
    <span id="status-msg"></span>
    <div class="player-panel right">
      <span id="label-p2" class="player-label">Player 2</span>
      <span id="score-p2">0</span>
    </div>
  </div>
  <div id="canvas-holder"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  <script src="/static/sketch.js"></script>
</body>
</html>
